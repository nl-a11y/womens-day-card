 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&amp;family=Quicksand:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    
    .app-container {
      height: 100%;
      width: 100%;
      position: relative;
      overflow: hidden;
    }
    
    #starfield {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    
    .flower-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 10;
      cursor: pointer;
      transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    .flower-container.visible {
      transform: translate(-50%, -50%) scale(1);
    }
    
    .flower-container:hover {
      transform: translate(-50%, -50%) scale(1.12);
    }
    
    @media (max-width: 768px) {
      .flower-container:hover {
        transform: translate(-50%, -50%) scale(1.08);
      }
    }
    
    .flower-svg {
      filter: drop-shadow(0 0 35px rgba(255, 100, 150, 0.8));
      animation: bouquetGlow 2.5s ease-in-out infinite;
    }
    
    @keyframes bouquetGlow {
      0%, 100% { filter: drop-shadow(0 0 25px rgba(255, 100, 150, 0.7)); }
      50% { filter: drop-shadow(0 0 45px rgba(255, 50, 100, 1)); }
    }
    
    .click-hint {
      position: absolute;
      bottom: -50px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.9);
      font-family: 'Quicksand', sans-serif;
      font-size: 16px;
      font-weight: 500;
      animation: pulse 2s ease-in-out infinite;
      white-space: nowrap;
    }
    
    @media (max-width: 768px) {
      .click-hint {
        font-size: 14px;
        bottom: -45px;
      }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.7; transform: translateX(-50%) translateY(0); }
      50% { opacity: 1; transform: translateX(-50%) translateY(-3px); }
    }
    
    .card-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease, visibility 0.5s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .card-overlay.visible {
      opacity: 1;
      visibility: visible;
    }
    
    .greeting-card {
      background: linear-gradient(135deg, #fff5f7 0%, #ffe4e8 50%, #ffd1d8 100%);
      border-radius: 20px;
      padding: 40px;
      max-width: 450px;
      width: 90%;
      transform: scale(0) rotate(-10deg);
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 
        0 25px 80px rgba(255, 100, 150, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.5),
        inset 0 0 60px rgba(255, 255, 255, 0.3);
      position: relative;
      overflow: hidden;
    }
    
    @media (max-width: 768px) {
      .greeting-card {
        padding: 30px;
        max-width: 85%;
      }
    }
    
    @media (max-width: 480px) {
      .greeting-card {
        padding: 25px;
        max-width: 90%;
      }
    }
    
    .greeting-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        45deg,
        transparent 40%,
        rgba(255, 255, 255, 0.3) 50%,
        transparent 60%
      );
      animation: shimmer 3s ease-in-out infinite;
    }
    
    @keyframes shimmer {
      0% { transform: translateX(-100%) rotate(45deg); }
      100% { transform: translateX(100%) rotate(45deg); }
    }
    
    .card-overlay.visible .greeting-card {
      transform: scale(1) rotate(0deg);
    }
    
    .card-title {
      font-family: 'Dancing Script', cursive;
      font-size: 42px;
      font-weight: 700;
      color: #e91e63;
      text-align: center;
      margin-bottom: 25px;
      position: relative;
      z-index: 1;
      text-shadow: 2px 2px 4px rgba(233, 30, 99, 0.2);
    }
    
    @media (max-width: 768px) {
      .card-title {
        font-size: 36px;
        margin-bottom: 20px;
      }
    }
    
    @media (max-width: 480px) {
      .card-title {
        font-size: 32px;
        margin-bottom: 18px;
      }
    }
    
    .card-message {
      font-family: 'Quicksand', sans-serif;
      font-size: 18px;
      line-height: 1.8;
      color: #6d4c5e;
      text-align: center;
      margin-bottom: 25px;
      min-height: 80px;
      position: relative;
      z-index: 1;
    }
    
    @media (max-width: 768px) {
      .card-message {
        font-size: 16px;
        line-height: 1.7;
        min-height: 70px;
      }
    }
    
    @media (max-width: 480px) {
      .card-message {
        font-size: 15px;
        line-height: 1.6;
        min-height: 60px;
        margin-bottom: 20px;
      }
    }
    
    .typewriter-cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background-color: #e91e63;
      margin-left: 2px;
      animation: blink 0.7s infinite;
      vertical-align: text-bottom;
    }
    
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
    
    .card-signature {
      font-family: 'Dancing Script', cursive;
      font-size: 24px;
      color: #ad1457;
      text-align: right;
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    
    .card-signature.visible {
      opacity: 1;
      transform: translateY(0);
    }
    
    @media (max-width: 768px) {
      .card-signature {
        font-size: 20px;
      }
    }
    
    @media (max-width: 480px) {
      .card-signature {
        font-size: 18px;
      }
    }
    
    .decorative-flowers {
      position: absolute;
      font-size: 30px;
      opacity: 0.6;
      z-index: 0;
    }
    
    .flower-tl { top: 10px; left: 15px; transform: rotate(-15deg); }
    .flower-tr { top: 10px; right: 15px; transform: rotate(15deg); }
    .flower-bl { bottom: 10px; left: 15px; transform: rotate(15deg); }
    .flower-br { bottom: 10px; right: 15px; transform: rotate(-15deg); }
    
    .close-card {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 30px;
      height: 30px;
      background: rgba(233, 30, 99, 0.1);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease;
    }
    
    .close-card:hover {
      background: rgba(233, 30, 99, 0.2);
    }
    
    .close-card::before,
    .close-card::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 2px;
      background: #ad1457;
    }
    
    .close-card::before { transform: rotate(45deg); }
    .close-card::after { transform: rotate(-45deg); }
    
    .shooting-star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
      box-shadow: 
        0 0 6px 2px rgba(255, 255, 255, 0.8),
        0 0 12px 4px rgba(255, 200, 255, 0.6);
      opacity: 0;
      z-index: 5;
    }
    
    .shooting-star::after {
      content: '';
      position: absolute;
      top: 50%;
      right: 100%;
      width: 80px;
      height: 1px;
      background: linear-gradient(to left, rgba(255, 255, 255, 0.8), transparent);
      transform: translateY(-50%);
    }

    /* Petal Falling Animation */
    .falling-petal {
      position: fixed;
      font-size: 24px;
      pointer-events: none;
      z-index: 50;
      animation: petalFall linear forwards;
    }

    @keyframes petalFall {
      0% {
        transform: translateY(-30px) rotateZ(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotateZ(360deg);
        opacity: 0;
      }
    }

    /* Firework Sparks */
    .firework-spark {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 60;
    }

    /* Floating Hearts */
    .floating-heart {
      position: fixed;
      font-size: 24px;
      pointer-events: none;
      z-index: 55;
      animation: heartFloat 4s linear forwards;
    }

    @keyframes heartFloat {
      0% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(-300px) scale(0.5);
        opacity: 0;
      }
    }

    /* Mouse Glow Trail */
    .mouse-glow {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 5;
      animation: glowFade 400ms ease-out forwards;
    }

    @keyframes glowFade {
      0% {
        opacity: 1;
        transform: scale(1);
      }
      100% {
        opacity: 0;
        transform: scale(0.5);
      }
    }

    /* Card Glow Effect */
    .card-overlay.visible .greeting-card {
      animation: cardGlow 2s ease-in-out infinite alternate;
    }

    @keyframes cardGlow {
      from {
        box-shadow: 
          0 25px 80px rgba(255, 100, 150, 0.4),
          0 0 0 1px rgba(255, 255, 255, 0.5),
          inset 0 0 60px rgba(255, 255, 255, 0.3),
          0 0 30px rgba(255, 150, 200, 0.3);
      }
      to {
        box-shadow: 
          0 25px 80px rgba(255, 100, 150, 0.6),
          0 0 0 1px rgba(255, 255, 255, 0.6),
          inset 0 0 60px rgba(255, 255, 255, 0.4),
          0 0 60px rgba(255, 100, 150, 0.5);
      }
    }

    /* Rose Hover Bloom Effect */
    .flower-container:hover .rose-flower {
      animation: bloomEffect 0.6s ease-out;
    }

    @keyframes bloomEffect {
      0% { transform: scale(0.95); }
      100% { transform: scale(1.1); }
    }

    /* Corner Flower Decorations */
    .corner-flowers {
      position: absolute;
      font-size: 28px;
      opacity: 0.7;
      z-index: 2;
    }

    .corner-tl { top: 15px; left: 15px; }
    .corner-tr { top: 15px; right: 15px; }
    .corner-bl { bottom: 15px; left: 15px; }
    .corner-br { bottom: 15px; right: 15px; }
  </style>

  <script>
    // ==================== Configuration ====================
    const defaultConfig = {
      greeting_title: "Chúc Mừng Ngày 8/3",
      greeting_message: "Nhân ngày 8/3, em xin gửi đến cô và tất cả các bạn nữ trong lớp những lời chúc tốt đẹp nhất. Chúc cô luôn mạnh khỏe, hạnh phúc và luôn tràn đầy nhiệt huyết để tiếp tục dìu dắt chúng em trên con đường học tập và trưởng thành. Cảm ơn cô vì sự tận tâm, kiên nhẫn và những bài học quý giá không chỉ trong sách vở mà còn trong cuộc sống.\n\nChúc các bạn nữ trong lớp luôn xinh đẹp, tự tin, học tập thật tốt và luôn giữ nụ cười rạng rỡ trên môi. Mong rằng mỗi ngày đến lớp sẽ là một ngày thật vui vẻ, đầy ắp kỷ niệm đẹp của tuổi học trò.\n\nChúc tất cả một ngày 8/3 thật ý nghĩa, nhiều niềm vui và luôn nhận được thật nhiều yêu thương!",
      signature: "Với tất cả tình yêu thương 💕",
      background_color: "#0a0a1a",
      card_bg_color: "#fff5f7",
      title_color: "#e91e63",
      text_color: "#6d4c5e",
      accent_color: "#ad1457"
    };

    let config = { ...defaultConfig };
    let typewriterTimeout = null;
    let isTyping = false;

    // ==================== Starfield with Text Stars ====================
    class Starfield {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.stars = [];
        this.textStars = [];
        this.numStars = 150;
        this.resize();
        this.createStars();
        this.createTextStars();
        this.time = 0;
        this.animate();
        window.addEventListener('resize', () => this.resize());
      }
      
      resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
      }
      
      createStars() {
        this.stars = [];
        for (let i = 0; i < this.numStars; i++) {
          this.stars.push({
            x: Math.random() * this.canvas.width,
            y: Math.random() * this.canvas.height,
            radius: Math.random() * 1.5 + 0.5,
            opacity: Math.random() * 0.5 + 0.3,
            twinkleSpeed: Math.random() * 0.02 + 0.005,
            twinkleDirection: Math.random() > 0.5 ? 1 : -1
          });
        }
      }

      createTextStars() {
        const text = "HAPPY WOMEN'S DAY";
        const fontSize = 60;
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = this.canvas.width;
        tempCanvas.height = 120;
        const tempCtx = tempCanvas.getContext('2d');
        
        tempCtx.font = `300 ${fontSize}px 'Arial', sans-serif`;
        tempCtx.fillStyle = 'white';
        tempCtx.textAlign = 'center';
        tempCtx.fillText(text, tempCanvas.width / 2, fontSize);
        
        const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
        const data = imageData.data;
        
        this.textStars = [];
        for (let i = 0; i < data.length; i += 4) {
          if (data[i + 3] > 128) {
            const pixelIndex = i / 4;
            const x = (pixelIndex % tempCanvas.width);
            const y = Math.floor(pixelIndex / tempCanvas.width);
            
            if (Math.random() > 0.25) {
              this.textStars.push({
                x: x,
                y: this.canvas.height * 0.2 + y,
                baseX: x,
                baseY: this.canvas.height * 0.2 + y,
                radius: Math.random() * 1.2 + 0.6,
                opacity: 0.8,
                twinkleSpeed: Math.random() * 0.02 + 0.01,
                twinkleDirection: Math.random() > 0.5 ? 1 : -1,
                floatOffset: Math.random() * Math.PI * 2
              });
            }
          }
        }
      }
      
      animate() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.time += 0.02;
        
        // Draw background stars
        this.stars.forEach(star => {
          star.opacity += star.twinkleSpeed * star.twinkleDirection;
          if (star.opacity >= 1) {
            star.opacity = 1;
            star.twinkleDirection = -1;
          } else if (star.opacity <= 0.2) {
            star.opacity = 0.2;
            star.twinkleDirection = 1;
          }
          
          this.ctx.beginPath();
          this.ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
          this.ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
          this.ctx.fill();
        });
        
        // Draw text stars with floating animation
        this.textStars.forEach(star => {
          star.opacity += star.twinkleSpeed * star.twinkleDirection;
          if (star.opacity >= 1) {
            star.opacity = 1;
            star.twinkleDirection = -1;
          } else if (star.opacity <= 0.4) {
            star.opacity = 0.4;
            star.twinkleDirection = 1;
          }
          
          // Floating effect
          const floatX = Math.sin(this.time * 0.5 + star.floatOffset) * 8;
          const floatY = Math.cos(this.time * 0.3 + star.floatOffset) * 5;

    // ==================== Shooting Stars ====================
    class ShootingStars {
      constructor(container) {
        this.container = container;
        this.spawnShootingStar();
      }
      
      spawnShootingStar() {
        const star = document.createElement('div');
        star.className = 'shooting-star';
        
        const startX = Math.random() * window.innerWidth * 0.7;
        const startY = Math.random() * window.innerHeight * 0.3;
        
        star.style.left = startX + 'px';
        star.style.top = startY + 'px';
        star.style.transform = 'rotate(45deg)';
        
        this.container.appendChild(star);
        
        // Animate
        let opacity = 0;
        let x = startX;
        let y = startY;
        const speed = 8 + Math.random() * 4;
        
        const animate = () => {
          if (opacity < 1 && x < startX + 50) {
            opacity += 0.1;
          } else if (x > startX + 200) {
            opacity -= 0.05;
          }
          
          x += speed;
          y += speed * 0.6;
          
          star.style.left = x + 'px';
          star.style.top = y + 'px';
          star.style.opacity = opacity;
          
          if (opacity > 0 && x < window.innerWidth && y < window.innerHeight) {
            requestAnimationFrame(animate);
          } else {
            star.remove();
          }
        };
        
        requestAnimationFrame(animate);
        
        // Schedule next shooting star
        const nextDelay = 2000 + Math.random() * 4000;
        setTimeout(() => this.spawnShootingStar(), nextDelay);
      }
    }

    // ==================== Typewriter Effect ====================
    function typeWriter(element, text, speed = 50, callback) {
      if (typewriterTimeout) {
        clearTimeout(typewriterTimeout);
      }
      
      isTyping = true;
      element.textContent = '';
      let i = 0;
      
      function type() {
        if (i < text.length) {
          element.textContent += text.charAt(i);
          i++;
          typewriterTimeout = setTimeout(type, speed);
        } else {
          isTyping = false;
          if (callback) callback();
        }
      }
      
      type();
    }

    // ==================== Fireworks Effect ====================
    function fireworks(x, y) {
      for (let i = 0; i < 25; i++) {
        const spark = document.createElement('div');
        spark.className = 'firework-spark';
        spark.style.left = x + 'px';
        spark.style.top = y + 'px';
        
        const colors = ['#ff66b2', '#ff4d94', '#ff3380', '#ff1a66', '#ff99cc'];
        spark.style.background = colors[Math.floor(Math.random() * colors.length)];
        spark.style.boxShadow = `0 0 8px ${spark.style.background}`;
        
        document.body.appendChild(spark);
        
        const angle = (Math.PI * 2 * i) / 25;
        const velocity = 4 + Math.random() * 3;
        const vx = Math.cos(angle) * velocity;
        const vy = Math.sin(angle) * velocity;
        
        let px = x, py = y;
        const startTime = Date.now();
        
        const animate = () => {
          const elapsed = Date.now() - startTime;
          const progress = elapsed / 600;
          
          if (progress >= 1) {
            spark.remove();
            return;
          }
          
          px += vx;
          py += vy;
          
          spark.style.left = px + 'px';
          spark.style.top = py + 'px';
          spark.style.opacity = 1 - progress;
          
          requestAnimationFrame(animate);
        };
        
        requestAnimationFrame(animate);
      }
    }
